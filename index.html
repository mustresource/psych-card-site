<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>心理牌卡資料庫</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
.header{background:#222;color:#fff;padding:15px;font-size:20px}
.toolbar{background:#fff;padding:10px}
input,button{padding:8px;margin:5px}
#cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;padding:20px}
.card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.card img{width:100%;height:200px;object-fit:cover}
.card-body{padding:10px}
.name{font-weight:bold}
.count{color:#d32f2f;font-weight:bold}
</style>

</head>

<body>

<div class="header">心理牌卡資料庫</div>

<div class="toolbar">
<input id="sheetUrl" placeholder="貼上 Google Sheet CSV">
<button onclick="loadSheet()">載入</button>
</div>

<div id="cards"></div>

<script>

let data=[]

async function loadSheet(){

try{

const url=document.getElementById("sheetUrl").value.trim()

if(!url){
alert("請貼上CSV網址")
return
}

// ✅ 穩定代理（避免CORS）
const proxy="https://api.allorigins.win/raw?url="+encodeURIComponent(url)

const res=await fetch(proxy)

if(!res.ok){
throw new Error("fetch失敗")
}

const text=await res.text()

parseCSV(text.replace(/\r/g,""))

}catch(e){
alert("讀取失敗，請確認CSV有發布")
console.error(e)
}

}

// ✅ 強化CSV解析（支援中文/逗號）
function parseCSV(text){

const rows=[]
let row=[],cell="",inside=false

for(let i=0;i<text.length;i++){
let c=text[i]

if(c=='"'){inside=!inside}
else if(c=="," && !inside){row.push(cell);cell=""}
else if(c=="\n" && !inside){row.push(cell);rows.push(row);row=[];cell=""}
else{cell+=c}
}

if(cell) row.push(cell)
if(row.length) rows.push(row)

rows.shift()

data=rows.filter(r=>r[0]).map(r=>({
name:r[0],
image:r[1],
category:r[2],
use:r[3],
count:r[4],
desc:r[5]
}))

render()

}

function render(){

const box=document.getElementById("cards")
box.innerHTML=""

data.forEach(c=>{

const div=document.createElement("div")
div.className="card"

div.innerHTML=`
<img src="${c.image}" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
<div class="card-body">
<div class="name">${c.name}</div>
<div class="count">套數：${c.count}</div>
<div>${c.category} / ${c.use}</div>
</div>
`

box.appendChild(div)

})

}

</script>

</body>
</html>
