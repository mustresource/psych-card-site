<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>心理牌卡資料庫 - 完整顯示版</title>

    <style>
        :root {
            --primary-color: #4a90e2;
            --accent-color: #d32f2f;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-muted: #666;
        }

        body {
            margin: 0;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
        }

        .header {
            background: linear-gradient(135deg, #2c3e50, #4a90e2);
            color: #fff;
            padding: 2rem 1rem;
            text-align: center;
        }

        .toolbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .search-box, .filter-select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
        }

        .search-box { width: 100%; max-width: 300px; }

        #cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-5px); }

        /* ✅ 這裡保證圖片看得到整張 */
        .card-img-container {
            width: 100%;
            height: 240px; /* 固定容器高度 */
            background: #ebebeb; /* 圖片背景色 */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* 核心：不裁切，完整縮放 */
        }

        .card-body {
            padding: 20px;
            flex-grow: 1;
        }

        .name { font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; }
        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 5px;
            background: #eef2f7;
            color: var(--primary-color);
        }
        .count {
            color: var(--accent-color);
            font-weight: bold;
            margin-top: 15px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
        .desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 10px;
            line-height: 1.5;
        }
    </style>
</head>

<body>

<div class="header"><h1>心理牌卡資料庫</h1></div>

<div class="toolbar">
    <input type="text" id="searchInput" class="search-box" placeholder="搜尋名稱或描述..." oninput="filterData()">
    <select id="categoryFilter" class="filter-select" onchange="filterData()">
        <option value="">所有分類</option>
    </select>
</div>

<div id="cards"><div>資料讀取中...</div></div>

<script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR-bt89hSX1YOKzg-V-eBayoXvqLUAfOQ_ccfs3S9v_2D3h3uhvKey_4qv5eK4M-alKi_pllvPEDOmn/pub?output=csv";
    const PROXY = "https://corsproxy.io/?";
    
    let allData = [];

    window.onload = loadSheet;

    async function loadSheet() {
        try {
            const res = await fetch(PROXY + encodeURIComponent(SHEET_URL));
            const text = await res.text();
            parseCSV(text.replace(/\r/g, ""));
            setupFilters();
            render(allData);
        } catch (e) {
            document.getElementById("cards").innerHTML = "載入失敗";
        }
    }

    function parseCSV(text) {
        const rows = [];
        let row = [], cell = "", inside = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            if (c == '"') inside = !inside;
            else if (c == "," && !inside) { row.push(cell); cell = ""; }
            else if (c == "\n" && !inside) { row.push(cell); rows.push(row); row = []; cell = ""; }
            else cell += c;
        }
        if (cell) row.push(cell);
        if (row.length) rows.push(row);
        rows.shift();

        allData = rows.filter(r => r[0]).map(r => ({
            name: r[0], image: r[1], category: r[2], use: r[3], count: r[4], desc: r[5]
        }));
    }

    function setupFilters() {
        const categories = [...new Set(allData.map(item => item.category))];
        const select = document.getElementById("categoryFilter");
        categories.forEach(cat => {
            if(cat) {
                const opt = document.createElement("option");
                opt.value = cat; opt.textContent = cat;
                select.appendChild(opt);
            }
        });
    }

    function filterData() {
        const searchTerm = document.getElementById("searchInput").value.toLowerCase();
        const selectedCat = document.getElementById("categoryFilter").value;
        const filtered = allData.filter(item => {
            const matchesSearch = item.name.toLowerCase().includes(searchTerm) || (item.desc && item.desc.toLowerCase().includes(searchTerm));
            const matchesCat = selectedCat === "" || item.category === selectedCat;
            return matchesSearch && matchesCat;
        });
        render(filtered);
    }

    function render(displayData) {
        const box = document.getElementById("cards");
        box.innerHTML = "";
        displayData.forEach(c => {
            const div = document.createElement("div");
            div.className = "card";
            div.innerHTML = `
                <div class="card-img-container">
                    <img src="${c.image}" onerror="this.src='https://via.placeholder.com/400x250?text=無圖片'">
                </div>
                <div class="card-body">
                    <div class="name">${c.name}</div>
                    <div><span class="tag">${c.category}</span><span class="tag">${c.use}</span></div>
                    <div class="desc">${c.desc || ""}</div>
                    <div class="count">庫存：${c.count} 套</div>
                </div>
            `;
            box.appendChild(div);
        });
    }
</script>

</body>
</html>
